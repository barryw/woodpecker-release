when:
  - event: [push, pull_request]

labels:
  platform: linux/amd64

steps:
  - name: lint
    image: koalaman/shellcheck:stable
    commands:
      - shellcheck --severity=warning plugin/entrypoint.sh plugin/lib/*.sh

  - name: test
    image: bats/bats:latest
    commands:
      - bats plugin/test/

  - name: build-plugin-base
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - mkdir -p /kaniko/.docker
      - 'echo "{\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json'
      - /kaniko/executor --dockerfile=plugin/Dockerfile --context=plugin --target=base --destination=ghcr.io/barryw/woodpecker-release:latest
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: build-plugin-go
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - mkdir -p /kaniko/.docker
      - 'echo "{\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json'
      - /kaniko/executor --dockerfile=plugin/Dockerfile --context=plugin --target=go --destination=ghcr.io/barryw/woodpecker-release:go
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: build-config-service
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - mkdir -p /kaniko/.docker
      - 'echo "{\"auths\":{\"ghcr.io\":{\"username\":\"barryw\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json'
      - /kaniko/executor --dockerfile=config-service/Dockerfile --context=config-service --destination=ghcr.io/barryw/woodpecker-config-service:latest
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: restart-config-service
    image: bitnami/kubectl:latest
    commands:
      - kubectl rollout restart deployment/woodpecker-config-service -n woodpecker
      - kubectl rollout status deployment/woodpecker-config-service -n woodpecker --timeout=60s
      - echo "Config service restarted with new image"
    when:
      - event: push
        branch: main
    depends_on: [build-config-service]
