when:
  - event: [push, pull_request]

labels:
  platform: linux/amd64

steps:
  - name: lint
    image: koalaman/shellcheck:stable
    commands:
      - shellcheck plugin/entrypoint.sh plugin/lib/*.sh

  - name: test
    image: bats/bats:latest
    commands:
      - bats plugin/test/

  - name: build-plugin-base
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: ghcr.io/barryw/woodpecker-release
      tags: latest
      target: base
      registry: ghcr.io
      username: barryw
      password:
        from_secret: github_token
      dockerfile: plugin/Dockerfile
      context: plugin
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: build-plugin-go
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: ghcr.io/barryw/woodpecker-release
      tags: go
      target: go
      registry: ghcr.io
      username: barryw
      password:
        from_secret: github_token
      dockerfile: plugin/Dockerfile
      context: plugin
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: build-config-service
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: ghcr.io/barryw/woodpecker-config-service
      tags: latest
      registry: ghcr.io
      username: barryw
      password:
        from_secret: github_token
      dockerfile: config-service/Dockerfile
      context: config-service
    when:
      - event: push
        branch: main
    depends_on: [lint, test]

  - name: restart-config-service
    image: bitnami/kubectl:latest
    commands:
      - kubectl rollout restart deployment/woodpecker-config-service -n woodpecker
      - kubectl rollout status deployment/woodpecker-config-service -n woodpecker --timeout=60s
      - echo "Config service restarted with new image"
    when:
      - event: push
        branch: main
    depends_on: [build-config-service]
