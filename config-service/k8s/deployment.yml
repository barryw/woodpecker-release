apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-config-service
  namespace: woodpecker
  labels:
    app: woodpecker-config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-config-service
  template:
    metadata:
      labels:
        app: woodpecker-config-service
    spec:
      containers:
        - name: config-service
          image: ghcr.io/barryw/woodpecker-config-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CONFIG_SERVICE_PORT
              value: "8000"
            - name: WEBHOOK_PUBLIC_KEY_PATH
              value: /run/secrets/webhook_public_key
            - name: TEMPLATES_PATH
              value: /templates/
          volumeMounts:
            - name: webhook-key
              mountPath: /run/secrets/webhook_public_key
              subPath: webhook_public_key
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: webhook-key
          secret:
            secretName: woodpecker-config-service
---
apiVersion: v1
kind: Service
metadata:
  name: woodpecker-config-service
  namespace: woodpecker
spec:
  selector:
    app: woodpecker-config-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
